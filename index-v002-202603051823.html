<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂齡學習中心 AI 簽到系統（離線版）</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#06C755">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- 離線版本：使用本地端 Libraries -->
    <script src="libs/xlsx.full.min.js"></script>
    <script src="libs/signature_pad.umd.min.js"></script>
    <script src="libs/html2canvas.min.js"></script>
    <style>
        /* 離線字體備援 */
        body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', sans-serif; }
    </style>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(180deg, #06C755 0%, #f0fdf4 30%); min-height: 100vh; margin: 0; }
        .btn { background: linear-gradient(135deg, #06C755, #05B54D); color: white; padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn:hover { opacity: 0.9; }
        .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab { padding: 10px 16px; border-radius: 20px; background: rgba(255,255,255,0.3); border: none; cursor: pointer; font-size: 14px; font-weight: bold; white-space: nowrap; }
        .tab.active { background: #06C755; color: white; }
        .input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .sig-canvas { border: 3px dashed #06C755; border-radius: 12px; background: white; touch-action: none; }
    </style>
</head>
<body>
    <!-- Header -->
    <div style="background: linear-gradient(135deg, #06C755, #05B54D); padding: 16px; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="color: white; margin: 0; font-size: 20px;">AI 智慧簽到系統</h1>
        <div id="adminBtn"></div>
    </div>

    <!-- Tabs -->
    <div style="padding: 12px; display: flex; gap: 8px; overflow-x: auto; flex-wrap: wrap;">
        <button class="tab active" onclick="switchTab('students')" id="tab-students">👥 學員</button>
        <button class="tab" onclick="switchTab('volunteers')" id="tab-volunteers">🌟 志工</button>
        <button class="tab" onclick="switchTab('course')" id="tab-course">📚 課程</button>
        <button class="tab" onclick="switchTab('signin')" id="tab-signin">✍️ 簽到</button>
        <button class="tab" onclick="switchTab('stats')" id="tab-stats">📊 統計</button>
        <button class="tab" onclick="switchTab('export')" id="tab-export">📥 匯出</button>
    </div>

    <!-- Content -->
    <div style="padding: 12px; width: 100%; max-width: 100%;">
        
        <!-- Students Tab -->
        <div id="students-content">
            <div class="card">
                <h3 style="margin: 0 0 12px;">➕ 新增學員</h3>
                <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;">
                    <input id="newStudentName" placeholder="姓名" class="input" style="flex:1;min-width:150px;">
                    <select id="newStudentGender" class="input" style="width:auto;">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                    <button onclick="addStudent()" class="btn">➕ 新增</button>
                </div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <button onclick="loadDemo(10)" style="padding:8px 16px;background:#e8f5e9;border-radius:8px;border:none;cursor:pointer;">📦 10人</button>
                    <button onclick="loadDemo(20)" style="padding:8px 16px;background:#e8f5e9;border-radius:8px;border:none;cursor:pointer;">📦 20人</button>
                    <button onclick="loadDemo(30)" style="padding:8px 16px;background:#e8f5e9;border-radius:8px;border:none;cursor:pointer;">📦 30人</button>
                    <button onclick="clearAllStudents()" style="padding:8px 16px;background:#ffebee;border-radius:8px;border:none;cursor:pointer;">🗑️ 清除</button>
                </div>
            </div>
            <div class="card">
                <h3 style="margin: 0 0 12px;">👥 學員列表（勾選列入簽到）</h3>
                <div id="manageList"></div>
            </div>
        </div>

        <!-- Volunteers Tab -->
        <div id="volunteers-content" style="display:none;">
            <div class="card">
                <h3 style="margin: 0 0 12px;">➕ 新增數位志工</h3>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <input id="newVolunteerName" placeholder="姓名" class="input" style="flex:1;min-width:150px;">
                    <select id="newVolunteerRole" class="input" style="width:auto;">
                        <option value="數位志工">數位志工</option>
                        <option value="數位幫手">數位幫手</option>
                    </select>
                    <button onclick="addVolunteer()" class="btn">➕ 新增</button>
                </div>
                <div style="margin-top:8px;">
                    <button onclick="clearAllVolunteers()" style="padding:10px 16px;background:#ffebee;border-radius:8px;border:none;cursor:pointer;">🗑️ 清除全部</button>
                </div>
            </div>
            <div class="card">
                <h3 style="margin: 0 0 12px;">🔍 搜尋</h3>
                <input id="searchVolunteerQuery" placeholder="輸入姓名搜尋..." class="input" onkeyup="renderVolunteerList()" style="margin-bottom:12px;">
            </div>
            <div class="card">
                <h3 style="margin: 0 0 12px;">🌟 數位志工列表</h3>
                <div id="volunteerList"></div>
            </div>
        </div>

        <!-- Course Tab -->
        <div id="course-content" style="display:none;">
            <div class="card">
                <h3 style="margin: 0 0 12px;">🏢 承辦單位</h3>
                <select id="organizerSelect" onchange="showSelectedOrganizer()" class="input" style="margin-bottom:8px;"></select>
                <div id="selectedOrgDisplay" style="padding:10px;background:#e8f5e9;border-radius:8px;margin-bottom:8px;color:#2e7d32;font-weight:bold;"></div>
                <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                    <input id="newOrganizer" placeholder="新增單位" class="input" style="flex:1;">
                    <button onclick="addOrganizer()" style="padding:10px 16px;background:#06C755;color:white;border-radius:8px;border:none;cursor:pointer;">➕ 新增</button>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button onclick="deleteCurrentOrganizer()" style="padding:10px 16px;background:#f44336;color:white;border-radius:8px;border:none;cursor:pointer;">🗑️ 刪除目前</button>
                </div>
            </div>
            <div class="card">
                <h3 style="margin: 0 0 12px;">📚 課程資訊</h3>
                <input id="courseTitle" placeholder="課程名稱" class="input" style="margin-bottom:8px;">
                <textarea id="courseGoal" placeholder="教學目標" class="input" style="margin-bottom:8px;" rows="2"></textarea>
                <input id="courseHours" placeholder="課程時數" class="input" style="margin-bottom:8px;">
                <button onclick="saveCourse()" class="btn" style="width:100%;">💾 儲存</button>
            </div>
        </div>

        <!-- Sign In Tab -->
        <div id="signin-content" style="display:none;">
            <div id="courseDisplay"></div>
            
            <!-- 簽到場次管理 -->
            <div class="card" style="background:#e3f2fd;border:2px solid #1976d2;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <h3 style="margin:0;color:#1565c0;">📂 簽到場次</h3>
                    <button onclick="createNewSession()" class="btn" style="padding:8px 16px;font-size:14px;background:#1976d2;">➕ 新增場次</button>
                </div>
                <select id="sessionSelect" onchange="loadSession()" class="input" style="margin-bottom:8px;">
                    <option value="">-- 選擇場次 --</option>
                </select>
            </div>
            
            <div class="card">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <div><label style="font-size:12px;color:#666;">📅 日期</label><input type="date" id="courseDate" class="input"></div>
                    <div><label style="font-size:12px;color:#666;">🕐 時間</label><input type="time" id="courseTime" class="input"></div>
                </div>
            </div>
            
            <!-- Chrome 風格分頁 -->
            <div style="display:flex;gap:4px;padding:8px;background:#f5f5f5;border-radius:8px;margin-bottom:12px;">
                <button onclick="switchSigninTab('student')" id="signin-tab-student" style="flex:1;padding:12px 16px;border:none;border-radius:6px;cursor:pointer;font-size:16px;font-weight:bold;background:#06C755;color:white;">👥 正式學員</button>
                <button onclick="switchSigninTab('volunteer')" id="signin-tab-volunteer" style="flex:1;padding:12px 16px;border:none;border-radius:6px;cursor:pointer;font-size:16px;font-weight:bold;background:#e0e0e0;color:#333;">🌟 數位志工</button>
                <button onclick="switchSigninTab('blank')" id="signin-tab-blank" style="flex:1;padding:12px 16px;border:none;border-radius:6px;cursor:pointer;font-size:16px;font-weight:bold;background:#e0e0e0;color:#333;">📝 空白簽到</button>
            </div>
            
            <!-- 正式學員簽到內容 -->
            <div id="signin-student-content">
                <div class="card">
                    <input id="searchQuery" placeholder="🔍 搜尋..." class="input" style="margin-bottom:8px;" onkeyup="renderStudentList()">
                    <button onclick="renderStudentList()" class="btn" style="width:100%;margin-bottom:12px;">搜尋</button>
                </div>
                <div class="card">
                    <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
                        <h3 style="margin:0;">📋 簽到名單</h3>
                        <span id="totalCount">共 0 人</span>
                    </div>
                    <div id="studentList"></div>
                </div>
            </div>
            
            <!-- 數位志工簽到內容 -->
            <div id="signin-volunteer-content" style="display:none;">
                <div class="card">
                    <input id="searchQueryVol" placeholder="🔍 搜尋數位志工..." class="input" style="margin-bottom:8px;" onkeyup="renderVolunteerSigninList()">
                    <button onclick="renderVolunteerSigninList()" class="btn" style="width:100%;margin-bottom:12px;">搜尋</button>
                </div>
                <div class="card">
                    <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
                        <h3 style="margin:0;">📋 數位志工簽到名單</h3>
                        <span id="volunteerCount">共 0 人</span>
                    </div>
                    <div id="volunteerSigninList"></div>
                </div>
            </div>
            
            <!-- 空白簽到內容 -->
            <div id="signin-blank-content" style="display:none;">
                <div class="card" style="background:#fff3e0;border:2px solid #ff9800;">
                    <h3 style="margin: 0 0 12px;color:#e65100;">📝 空白簽到（臨時學員）</h3>
                    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;">
                        <input id="blankName" placeholder="姓名" class="input" style="flex:1;min-width:150px;">
                        <input type="date" id="blankDate" class="input" style="width:auto;">
                        <input type="time" id="blankTime" class="input" style="width:auto;">
                        <button onclick="addBlankSignin()" class="btn" style="background:#ff9800;">➕ 新增</button>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <button onclick="clearAllBlank()" style="padding:10px 16px;background:#ffebee;border-radius:8px;border:none;cursor:pointer;">🗑️ 清除全部</button>
                    </div>
                </div>
                <div class="card">
                    <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
                        <h3 style="margin:0;color:#e65100;">📋 空白簽到名單</h3>
                        <span id="blankCount">共 0 人</span>
                    </div>
                    <div id="blankList"></div>
                </div>
            </div>
        </div>

        <!-- Stats Tab -->
        <div id="stats-content" style="display:none;">
            <div class="card" style="text-align:center;">
                <h3 style="margin:0 0 16px;">📊 統計</h3>
                <div style="display:flex;justify-content:center;gap:20px;font-size:20px;margin-bottom:16px;">
                    <div style="background:#e8f5e9;padding:16px 24px;border-radius:12px;min-width:100px;">
                        <div style="font-weight:bold;color:#06C755;font-size:28px;" id="statMale">0</div>
                        <div>男學員</div>
                    </div>
                    <div style="background:#fce4ec;padding:16px 24px;border-radius:12px;min-width:100px;">
                        <div style="font-weight:bold;color:#e91e63;font-size:28px;" id="statFemale">0</div>
                        <div>女學員</div>
                    </div>
                    <div style="background:#fff3e0;padding:16px 24px;border-radius:12px;min-width:100px;">
                        <div style="font-weight:bold;color:#ff9800;font-size:28px;" id="statVolunteer">0</div>
                        <div>🌟 志工</div>
                    </div>
                </div>
                <div style="margin-top:8px;font-size:24px;font-weight:bold;color:#06C755;">總計：<span id="statTotal">0</span>人</div>
            </div>
        </div>

        <!-- Export Tab -->
        <div id="export-content" style="display:none;">
            <div class="card">
                <h3 style="margin: 0 0 12px;">📋 正式學員簽到</h3>
                <button onclick="exportExcel()" class="btn" style="width:100%;margin-bottom:8px;">📊 匯出 Excel</button>
                <button onclick="previewWithSignatures()" class="btn" style="width:100%;background:#1976d2;">👁️ 預覽含簽名</button>
            </div>
            <div class="card">
                <h3 style="margin: 0 0 12px;">📝 空白簽到表</h3>
                <button onclick="previewBlankSignins()" class="btn" style="width:100%;background:#ff9800;margin-bottom:8px;">👁️ 預覽空白簽到</button>
                <button onclick="exportBlankExcel()" class="btn" style="width:100%;background:#4caf50;">📊 匯出空白簽到 Excel</button>
            </div>
            <div class="card">
                <h3 style="margin:0 0 12px;">📋 預覽</h3>
                <div id="previewTable"></div>
            </div>
        </div>
    </div>

    <!-- Signature Modal -->
    <div id="sigModal" class="modal">
        <div style="background:white;border-radius:16px;padding:24px;width:95%;max-width:500px;">
            <h3 id="sigTitle" style="text-align:center;margin:0 0 16px;">簽名</h3>
            <canvas id="sigCanvas" class="sig-canvas" style="width:100%;height:200px;"></canvas>
            <div style="display:flex;gap:8px;justify-content:center;margin-top:16px;">
                <button onclick="clearSig()" style="padding:10px 20px;background:#f44336;color:white;border:none;border-radius:8px;">清除</button>
                <button onclick="closeSigModal()" style="padding:10px 20px;background:#9e9e9e;color:white;border:none;border-radius:8px;">取消</button>
                <button onclick="saveSig()" class="btn">確認</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer style="text-align:center;padding:20px;color:#666;font-size:14px;">
        <p>© 2026 花蓮縣花蓮市樂齡學習中心</p>
        <p>開發人員：GM | 電話：03-8328647</p>
        <p>版本：v0.02 (115.3.5)</p>
    </footer>

    <script>
        // Data
        let students = JSON.parse(localStorage.getItem('s_students') || '[]');
        students.forEach(s => { if (s.checked === undefined) s.checked = true; });
        let volunteers = JSON.parse(localStorage.getItem('s_volunteers') || '[]');
        volunteers.forEach(v => { if (v.checked === undefined) v.checked = true; });
        
        // 簽到場次管理
        let currentSession = localStorage.getItem('s_currentSession') || new Date().toISOString().slice(0,10);
        let allSessions = JSON.parse(localStorage.getItem('s_allSessions') || '[]');
        if(!allSessions.includes(currentSession)) {
            allSessions.push(currentSession);
            allSessions.sort().reverse();
            localStorage.setItem('s_allSessions',JSON.stringify(allSessions));
        }
        
        // 根據場次載入簽到資料
        let signatures = JSON.parse(localStorage.getItem('s_signatures_' + currentSession) || '{}');
        let blankSignins = JSON.parse(localStorage.getItem('s_blankSignins_' + currentSession) || '[]');
        
        const defaultOrgs = ['花蓮市樂齡學習中心','吉安鄉樂齡學習中心','壽豐鄉樂齡學習中心','鳳林鎮樂齡學習中心','玉里鎮樂齡學習中心','其他'];
        
        // Init
        document.getElementById('courseDate').valueAsDate = new Date();
        document.getElementById('courseTime').value = new Date().toTimeString().substring(0,5);
        document.getElementById('blankDate').valueAsDate = new Date();
        document.getElementById('blankTime').value = new Date().toTimeString().substring(0,5);
        
        // 載入場次列表
        renderSessionSelect();
        
        const savedCourse = JSON.parse(localStorage.getItem('s_course') || '{}');
        if(savedCourse.date) document.getElementById('courseDate').value = savedCourse.date;
        if(savedCourse.time) document.getElementById('courseTime').value = savedCourse.time;
        
        renderAll();
        
        function renderAll() {
            renderAdminBtn();
            loadCourseInfo();
            renderStudentList();
            renderManageList();
            renderVolunteerList();
            renderBlankList();
            updateStats();
        }

        // Tab
        function switchTab(tab) {
            if(['stats','export'].includes(tab) && !isAdmin()) { alert('需管理員登入'); return; }
            ['students','volunteers','course','signin','stats','export'].forEach(t => {
                document.getElementById(t+'-content').style.display = 'none';
                document.getElementById('tab-'+t).classList.remove('active');
            });
            document.getElementById(tab+'-content').style.display = 'block';
            document.getElementById('tab-'+tab).classList.add('active');
            if(tab === 'stats' || tab === 'export') { updateStats(); renderExportPreview(); }
        }

        // 簽到場次管理
        function renderSessionSelect() {
            let allSessions = JSON.parse(localStorage.getItem('s_allSessions') || '[]');
            let currentSession = localStorage.getItem('s_currentSession') || new Date().toISOString().slice(0,10);
            let sel = document.getElementById('sessionSelect');
            sel.innerHTML = '<option value="">-- 選擇場次 --</option>';
            allSessions.forEach(s => {
                let label = s + (s === currentSession ? ' (目前)' : '');
                sel.innerHTML += '<option value="'+s+'" '+(s === currentSession ? 'selected' : '')+'>'+label+'</option>';
            });
        }

        function createNewSession() {
            let date = prompt('請輸入新場次日期 (YYYY-MM-DD)：', new Date().toISOString().slice(0,10));
            if(!date) return;
            let allSessions = JSON.parse(localStorage.getItem('s_allSessions') || '[]');
            if(allSessions.includes(date)) {
                alert('此場次已存在！');
                return;
            }
            allSessions.push(date);
            allSessions.sort().reverse();
            localStorage.setItem('s_allSessions',JSON.stringify(allSessions));
            localStorage.setItem('s_currentSession',date);
            location.reload();
        }

        function loadSession() {
            let sel = document.getElementById('sessionSelect');
            let date = sel.value;
            if(!date) return;
            localStorage.setItem('s_currentSession',date);
            location.reload();
        }

        function switchSigninTab(type) {
            // 隱藏全部
            document.getElementById('signin-student-content').style.display = 'none';
            document.getElementById('signin-volunteer-content').style.display = 'none';
            document.getElementById('signin-blank-content').style.display = 'none';
            // 重置全部按鈕顏色
            document.getElementById('signin-tab-student').style.background = '#e0e0e0';
            document.getElementById('signin-tab-student').style.color = '#333';
            document.getElementById('signin-tab-volunteer').style.background = '#e0e0e0';
            document.getElementById('signin-tab-volunteer').style.color = '#333';
            document.getElementById('signin-tab-blank').style.background = '#e0e0e0';
            document.getElementById('signin-tab-blank').style.color = '#333';
            
            // 顯示選中的
            if(type === 'student') {
                document.getElementById('signin-student-content').style.display = 'block';
                document.getElementById('signin-tab-student').style.background = '#06C755';
                document.getElementById('signin-tab-student').style.color = 'white';
            } else if(type === 'volunteer') {
                document.getElementById('signin-volunteer-content').style.display = 'block';
                document.getElementById('signin-tab-volunteer').style.background = '#9c27b0';
                document.getElementById('signin-tab-volunteer').style.color = 'white';
                renderVolunteerSigninList();
            } else {
                document.getElementById('signin-blank-content').style.display = 'block';
                document.getElementById('signin-tab-blank').style.background = '#ff9800';
                document.getElementById('signin-tab-blank').style.color = 'white';
            }
        }
        
        function renderVolunteerSigninList() {
            let query = document.getElementById('searchQueryVol').value.trim().toLowerCase();
            let list = volunteers.filter(v => v.checked);
            if(query) list = list.filter(v => v.name.toLowerCase().includes(query));
            
            if(list.length === 0) {
                document.getElementById('volunteerSigninList').innerHTML = '<p style="text-align:center;color:#999;">尚無勾選的數位志工</p>';
                document.getElementById('volunteerCount').innerText = '共 0 人';
                return;
            }
            
            let html = '<table style="width:100%;border-collapse:collapse;border:2px solid #9c27b0;border-radius:10px;overflow:hidden;font-size:20px;">';
            html += '<tr style="background:#9c27b0;color:white;"><th style="padding:14px;">號</th><th style="padding:14px;">姓名</th><th style="padding:14px;text-align:center;">角色</th><th style="padding:14px;text-align:center;">簽到</th></tr>';
            list.forEach((p,i) => {
                let sig = signatures[p.id];
                let bg = sig ? '#e1bee7' : '#fff';
                html += '<tr style="background:'+bg+';">';
                html += '<td style="padding:14px;text-align:center;font-weight:bold;font-size:22px;">'+(i+1)+'</td>';
                html += '<td style="padding:14px;font-weight:bold;font-size:24px;">'+p.name+'</td>';
                html += '<td style="padding:14px;text-align:center;">'+(p.role||'數位志工')+'</td>';
                html += '<td style="padding:14px;text-align:center;"><button onclick="openSig('+p.id+',\''+p.name+'\')" style="padding:10px 20px;background:#9c27b0;color:white;border:none;border-radius:6px;cursor:pointer;font-size:18px;">'+(sig?'✓ '+sig.time:'✍️ 簽到')+'</button></td>';
                html += '</tr>';

            let ws = [['','花蓮市樂齡學習中心 簽到表'],['承辦單位',course.organizer||'-'],['課程名稱',course.title||'-'],['日期',date],['',''],['編號','姓名','性別','簽名','時間']];
            let male=0,female=0;
            list.forEach((p,i) => {
                let sig = signatures[p.id];
                if(sig) { if(p.gender==='男')male++; else if(p.gender==='女')female++; }
                ws.push([i+1, p.name, p.gender||'志工', sig?'✓':'-', sig?sig.time:'-']);
            });
            ws.push(['',''],['男',male,'人'],['女',female,'人'],['總計',male+female,'人']);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ws), '簽到表');
            XLSX.writeFile(wb, '簽到表_'+date+'.xlsx');
        }
        
        function previewWithSignatures() {
            let course = JSON.parse(localStorage.getItem('s_course') || '{}');
            let date = document.getElementById('courseDate').value;
            let list = [...students.filter(s => s.checked), ...volunteers.filter(v => v.checked)];
            let html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>簽到表</title><script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"><\/script><style>body{font-family:Noto Sans TC,sans-serif;padding:20px;background:#f5f5f5}.c{background:white;padding:20px;border-radius:10px;margin-bottom:20px}.t{width:100%;border-collapse:collapse}.t th{background:#06C755;color:white;padding:12px}.t td{padding:10px;border-bottom:1px solid #ddd}</style></head><body>';
            html += '<div class="c"><h1 style="color:#06C755;margin:0;">花蓮市樂齡學習中心 簽到表</h1>';
            if(course.organizer) html += '<div>'+course.organizer+'</div>';
            if(course.title) html += '<div>'+course.title+'</div>';
            html += '<div>'+date+'</div></div>';
            html += '<table class="t"><tr><th>#</th><th>姓名</th><th>性別</th><th>簽名</th><th>時間</th></tr>';
            list.forEach((p,i) => {
                let sig = signatures[p.id];
                html += '<tr><td>'+(i+1)+'</td><td><strong>'+p.name+'</strong></td><td>'+(p.gender||'志工')+'</td><td>'+(sig?'<img src="'+sig.dataUrl+'" height="40">':'-')+'</td><td>'+(sig?sig.time:'-')+'</td></tr>';
            });
            html += '</table>';
            html += '<button onclick="html2canvas(document.body).then(c=>{let l=document.createElement(\'a\');l.download=\'簽到表.png\';l.href=c.toDataURL();l.click();})" style="margin:20px;padding:15px 30px;background:#06C755;color:white;border:none;border-radius:10px;cursor:pointer;font-size:16px;">📷 匯出圖片</button>';
            html += '</body></html>';
            let w = window.open('','_blank');
            w.document.write(html);
            w.document.close();
        }
    </script>
